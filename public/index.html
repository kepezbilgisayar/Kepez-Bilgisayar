<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dükkan Envanter & Stok Otomasyonu</title>
    <style>
        :root {
            --bg-main: #0f172a; --bg-card: #1e293b; --bg-input: #0f172a;
            --border-color: #334155; --text-main: #f8fafc; --text-muted: #94a3b8;
            --accent: #38bdf8; --accent-hover: #0ea5e9; --success: #4ade80;
            --warning: #fbbf24; --danger: #f87171;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 1500px; margin: 0 auto; }
        .header { margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; font-weight: 700; margin: 0; }
        .header p { color: var(--text-muted); margin: 4px 0 0 0; font-size: 14px; }
        .search-bar-container { background: var(--bg-card); padding: 16px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 20px; display: flex; gap: 12px; }
        .search-input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-main); color: var(--text-main); font-size: 14px; outline: none; }
        .tabs-container { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; background: transparent; border: none; color: var(--text-muted); font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 8px; }
        .tab-btn.active { background: var(--accent); color: var(--bg-main); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .panel-card { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color); padding: 24px; margin-bottom: 20px; }
        .panel-title { font-size: 16px; font-weight: 600; margin: 0 0 20px 0; padding-bottom: 12px; border-bottom: 1px solid var(--border-color); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea { padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-input); color: var(--text-main); outline: none; }
        .sales-section { grid-column: 1 / -1; background: rgba(56, 189, 248, 0.05); padding: 20px; border-radius: 8px; border: 1px dashed var(--accent); margin-top: 10px; display: none; }
        .sales-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
        .form-actions { grid-column: 1 / -1; display: flex; justify-content: flex-end; gap: 12px; margin-top: 16px; border-top: 1px solid var(--border-color); padding-top: 16px; }
        .category-filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .cat-filter-btn { padding: 6px 12px; font-size: 12px; background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 20px; cursor: pointer; }
        .cat-filter-btn.active { background: var(--border-color); color: var(--text-main); }
        button { padding: 10px 20px; font-size: 14px; font-weight: 600; border-radius: 8px; cursor: pointer; border: none; }
        .btn-primary { background: var(--accent); color: var(--bg-main); }
        .btn-secondary { background: var(--border-color); color: var(--text-main); }
        .btn-table-edit { background: #fef3c7; color: #d97706; padding: 6px 12px; font-size: 12px; margin-right: 4px;}
        .btn-table-delete { background: #fee2e2; color: #dc2626; padding: 6px 12px; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th { background: var(--bg-main); color: var(--text-muted); padding: 14px 16px; border-bottom: 1px solid var(--border-color); }
        td { padding: 14px 16px; border-bottom: 1px solid var(--border-color); color: var(--text-main); }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; display: inline-block; }
        .badge-success { background: rgba(74, 222, 128, 0.2); color: var(--success); }
        .badge-warning { background: rgba(251, 191, 36, 0.2); color: var(--warning); }
        .badge-danger { background: rgba(248, 113, 113, 0.2); color: var(--danger); }
        .badge-info { background: rgba(56, 189, 248, 0.2); color: var(--accent); }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <h1>Envanter ve Garanti Otomasyonu</h1>
            <p>Dükkan stok durumunu, cihaz kondisyonlarını ve satış arşivini buradan izleyebilirsiniz.</p>
        </div>
    </div>
    <div class="search-bar-container">
        <input type="text" id="genelArama" class="search-input" placeholder="🔍 Seri Numarası (S/N) veya Ürün Adı ile Jet Arama..." oninput="listeleriYenile()">
    </div>
    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('sekme-form')">📥 Yeni Ürün / Kayıt Ekle</button>
        <button class="tab-btn" onclick="switchTab('sekme-stok')">📦 Aktif Envanter</button>
        <button class="tab-btn" onclick="switchTab('sekme-arsiv')">📜 Satış Arşivi</button>
    </div>
    <div id="sekme-form" class="tab-content active">
        <div class="panel-card">
            <h3 class="panel-title" id="formBaslik">Yeni Cihaz / Parça Girişi</h3>
            <form id="envanterForm">
                <input type="hidden" id="editId" value="">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Kategori</label>
                       <select id="urun_turu">
    <option>Laptop</option>
    <option>Masaüstü Bilgisayar</option>
    <option>Monitör</option>
    <option>Bilgisayar Bileşenleri</option>
    <option>Bilgisayar Aksesuarları</option>
    <option>Şarj Aleti</option>
    <option>Modem</option>
    <option>Kablolar</option>
    <option>TV & Uydu</option>
    <option>Diğer</option>
</select>
                    </div>
                    <div class="form-group"><label>Ürün Adı / Modeli</label><input type="text" id="urun_adi" required></div>
                    <div class="form-group"><label>Marka</label><input type="text" id="marka"></div>
                    <div class="form-group"><label>Seri Numarası (S/N)</label><input type="text" id="seri_no"></div>
                    <div class="form-group"><label>Kondisyon</label><select id="durum"><option>Sıfır</option><option>İkinci El</option><option>Arızalı</option></select></div>
                    <div class="form-group"><label>Alış Maliyeti (₺)</label><input type="number" id="maliyet" step="0.01" required></div>
                    <div class="form-group"><label>Satış Fiyatı (₺)</label><input type="number" id="fiyat" step="0.01" required></div>
                    <div class="form-group"><label>Alış Tarihi</label><input type="date" id="alis_tarihi"></div>
                    <div class="form-group"><label>Garanti Bitiş</label><input type="date" id="garanti_bitis"></div>
                    <div class="form-group" style="grid-column: span 2;"><label>Teknik Özellikler</label><input type="text" id="model"></div>
                    <div class="form-group" style="grid-column: span 2;"><label>Açıklama</label><textarea id="aciklama"></textarea></div>
                    <div class="form-group"><label>Stok Durumu</label><select id="stok_durumu" onchange="stokDurumKontrol()"><option value="Stokta">Stokta</option><option value="Satıldı">Satıldı</option></select></div>
                    <div id="sales-section" class="sales-section">
                        <div class="sales-grid">
                            <div class="form-group"><label>Satış Tarihi</label><input type="date" id="satis_tarihi"></div>
                            <div class="form-group"><label>Ödeme Yöntemi</label><select id="odeme_yontemi"><option>Nakit</option><option>POS Cihazı</option></select></div>
                            <div class="form-group"><label>Müşteri Adı</label><input type="text" id="musteri_ad"></div>
                            <div class="form-group"><label>Müşteri Tel</label><input type="text" id="musteri_tel"></div>
                        </div>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="formuTemizle()">Temizle</button>
                    <button type="submit" class="btn-primary" id="kaydetButon">Envantere Kaydet</button>
                </div>
            </form>
        </div>
    </div>
    <div id="sekme-stok" class="tab-content"><div class="category-filters" id="stokKategoriFiltre"></div><div class="panel-card"><table><thead><tr><th>Kategori / Ürün</th><th>Marka/Model</th><th>S/N / Durum</th><th>Garanti</th><th>Maliyet</th><th>Fiyat</th><th>Notlar</th><th>İşlemler</th></tr></thead><tbody id="aktifStokTablosu"></tbody></table></div></div>
    <div id="sekme-arsiv" class="tab-content"><div class="category-filters" id="arsivKategoriFiltre"></div><div class="panel-card"><table><thead><tr><th>Kategori / Ürün</th><th>Müşteri</th><th>Satış/Ödeme</th><th>Seri No</th><th>Maliyet</th><th>Fiyat</th><th>Garanti</th><th>İşlemler</th></tr></thead><tbody id="satisArsivTablosu"></tbody></table></div></div>
</div>
<script>
    let tumUrunler = []; let seciliStokKategori = 'Tümü'; let seciliArsivKategori = 'Tümü';
    const kategoriler = ["Tümü", "Laptop", "Masaüstü Bilgisayar", "Monitör", "Bilgisayar Bileşenleri", "Bilgisayar Aksesuarları", "Şarj Aleti", "Modem", "Kablolar", "TV & Uydu", "Diğer"];

    window.onload = function() { filtreButonlariniOlustur(); urunleriGetir(); };

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        const btns = document.querySelectorAll('.tab-btn');
        btns.forEach(btn => { if(btn.getAttribute('onclick').includes(tabId)) btn.classList.add('active'); });
    }

    function stokDurumKontrol() {
        const durum = document.getElementById('stok_durumu').value;
        document.getElementById('sales-section').style.display = (durum === 'Satıldı') ? 'block' : 'none';
    }

    function filtreButonlariniOlustur() {
        const stokDiv = document.getElementById('stokKategoriFiltre'); const arsivDiv = document.getElementById('arsivKategoriFiltre');
        stokDiv.innerHTML = ''; arsivDiv.innerHTML = '';
        kategoriler.forEach(kat => {
            stokDiv.innerHTML += `<button class="cat-filter-btn ${kat==='Tümü'?'active':''}" onclick="setKategori('stok','${kat}')">${kat}</button>`;
            arsivDiv.innerHTML += `<button class="cat-filter-btn ${kat==='Tümü'?'active':''}" onclick="setKategori('arsiv','${kat}')">${kat}</button>`;
        });
    }

    function setKategori(tip, kat) {
        const parent = document.getElementById(tip === 'stok' ? 'stokKategoriFiltre' : 'arsivKategoriFiltre');
        parent.querySelectorAll('.cat-filter-btn').forEach(btn => { if(btn.innerText === kat) btn.classList.add('active'); else btn.classList.remove('active'); });
        if(tip === 'stok') seciliStokKategori = kat; else seciliArsivKategori = kat;
        listeleriYenile();
    }

    function garantiHesapla(bitisTarihi) {
        if (!bitisTarihi) return '<span class="badge badge-danger">Garantisiz</span>';
        const bugun = new Date(); const bitis = new Date(bitisTarihi);
        const farkGun = Math.ceil((bitis - bugun) / (1000 * 60 * 60 * 24));
        if (farkGun > 30) return `<span class="badge badge-success">🛡️ ${farkGun} Gün</span>`;
        if (farkGun <= 30 && farkGun >= 0) return `<span class="badge badge-warning">⚠️ ${farkGun} Gün</span>`;
        return '<span class="badge badge-danger">⌛ Süre Doldu</span>';
    }

    async function urunleriGetir() {
        try { const response = await fetch('/api/urunler'); tumUrunler = await response.json(); listeleriYenile(); } catch (error) { console.error("Hata:", error); }
    }

    document.getElementById('envanterForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        const urunData = {
            urun_turu: document.getElementById('urun_turu').value, urun_adi: document.getElementById('urun_adi').value,
            marka: document.getElementById('marka').value, model: document.getElementById('model').value,
            seri_no: document.getElementById('seri_no').value, durum: document.getElementById('durum').value,
            alis_tarihi: document.getElementById('alis_tarihi').value, garanti_bitis: document.getElementById('garanti_bitis').value,
            maliyet: document.getElementById('maliyet').value || '0', fiyat: document.getElementById('fiyat').value || '0',
            aciklama: document.getElementById('aciklama').value, stok_durumu: document.getElementById('stok_durumu').value,
            satis_tarihi: document.getElementById('satis_tarihi').value, odeme_yontemi: document.getElementById('odeme_yontemi').value,
            musteri_ad: document.getElementById('musteri_ad').value, musteri_tel: document.getElementById('musteri_tel').value
        };

        const url = id ? `/api/urunler/${id}` : '/api/urunler';
        const method = id ? 'PUT' : 'POST';

        try {
            const res = await fetch(url, { method: method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(urunData) });
            if (!res.ok) throw new Error("Başarısız!");
            alert('✅ İşlem Başarılı Usta!');
            formuTemizle(); await urunleriGetir();
            switchTab(urunData.stok_durumu === 'Satıldı' ? 'sekme-arsiv' : 'sekme-stok');
        } catch (err) { alert('❌ Sunucu Hatası!'); }
    });

    function urunDuzenle(id) {
        const urun = tumUrunler.find(u => u.id === id); if (!urun) return;
        document.getElementById('editId').value = urun.id;
        document.getElementById('urun_turu').value = urun.urun_turu;
        document.getElementById('urun_adi').value = urun.urun_adi;
        document.getElementById('marka').value = urun.marka;
        document.getElementById('model').value = urun.model;
        document.getElementById('seri_no').value = urun.seri_no;
        document.getElementById('durum').value = urun.durum;
        document.getElementById('maliyet').value = urun.maliyet;
        document.getElementById('fiyat').value = urun.fiyat;
        document.getElementById('stok_durumu').value = urun.stok_durumu;
        stokDurumKontrol();
        document.getElementById('kaydetButon').innerText = "Değişiklikleri Güncelle";
        switchTab('sekme-form');
    }

    async function urunSil(id) {
        if (!confirm('Silinsin mi usta?')) return;
        try { await fetch(`/api/urunler/${id}`, { method: 'DELETE' }); await urunleriGetir(); } catch (err) { alert('Hata!'); }
    }

    function formuTemizle() {
        document.getElementById('envanterForm').reset(); document.getElementById('editId').value = '';
        document.getElementById('kaydetButon').innerText = "Envantere Kaydet"; stokDurumKontrol();
    }

    function listeleriYenile() {
        const aramaKelimesi = document.getElementById('genelArama').value.toLowerCase().trim();
        const stokTbody = document.getElementById('aktifStokTablosu'); const arsivTbody = document.getElementById('satisArsivTablosu');
        stokTbody.innerHTML = ''; arsivTbody.innerHTML = '';

        tumUrunler.forEach(urun => {
            const aramaEslesti = (urun.urun_adi || '').toLowerCase().includes(aramaKelimesi) || (urun.seri_no || '').toLowerCase().includes(aramaKelimesi);
            if (!aramaEslesti && aramaKelimesi !== '') return;

            const kondRozet = urun.durum === 'Sıfır' ? '<span class="badge badge-success">Sıfır</span>' : '<span class="badge badge-info">2. El</span>';
            const garantiRozeti = garantiHesapla(urun.garanti_bitis);

            if (urun.stok_durumu !== 'Satıldı') {
                if (seciliStokKategori !== 'Tümü' && urun.urun_turu !== seciliStokKategori) return;
                stokTbody.innerHTML += `<tr><td>${urun.urun_adi}</td><td>${urun.marka}</td><td>${kondRozet}</td><td>${garantiRozeti}</td><td>${urun.maliyet} ₺</td><td>${urun.fiyat} ₺</td><td>${urun.aciklama || '-'}</td><td><button type="button" class="btn-table-edit" onclick="urunDuzenle(${urun.id})">E</button><button type="button" class="btn-table-delete" onclick="urunSil(${urun.id})">X</button></td></tr>`;
            } else {
                if (seciliArsivKategori !== 'Tümü' && urun.urun_turu !== seciliArsivKategori) return;
                arsivTbody.innerHTML += `<tr><td>${urun.urun_adi}</td><td>${urun.musteri_ad}</td><td>${urun.satis_tarihi}</td><td>${urun.seri_no}</td><td>${urun.maliyet} ₺</td><td>${urun.fiyat} ₺</td><td>${garantiRozeti}</td><td><button type="button" class="btn-table-edit" onclick="urunDuzenle(${urun.id})">E</button><button type="button" class="btn-table-delete" onclick="urunSil(${urun.id})">X</button></td></tr>`;
            }
        });
    }
</script>
</body>
</html>
